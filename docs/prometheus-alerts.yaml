# MXKeys Prometheus Alerting Rules
# Copy to your Prometheus rules directory

groups:
  - name: mxkeys
    interval: 30s
    rules:
      # High error rate
      - alert: MXKeysHighErrorRate
        expr: |
          sum(rate(mxkeys_http_requests_total{status=~"5.."}[5m]))
          /
          sum(rate(mxkeys_http_requests_total[5m]))
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MXKeys high error rate"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      # High rate limiting
      - alert: MXKeysHighRateLimiting
        expr: |
          rate(mxkeys_rate_limited_requests_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MXKeys rate limiting many requests"
          description: "{{ $value | humanize }} requests/sec are being rate limited"

      # Upstream failures
      - alert: MXKeysUpstreamFailures
        expr: |
          rate(mxkeys_upstream_failures_total[5m]) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "MXKeys upstream failures detected"
          description: "{{ $value | humanize }} upstream failures/sec for reason {{ $labels.reason }}"

      # High latency
      - alert: MXKeysHighLatency
        expr: |
          histogram_quantile(0.95, 
            rate(mxkeys_http_request_duration_seconds_bucket[5m])
          ) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MXKeys high request latency"
          description: "95th percentile latency is {{ $value | humanizeDuration }}"

      # Key fetch failures
      - alert: MXKeysKeyFetchFailures
        expr: |
          rate(mxkeys_keys_fetch_attempts_total{status="failure"}[5m])
          /
          rate(mxkeys_keys_fetch_attempts_total[5m])
          > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "MXKeys high key fetch failure rate"
          description: "{{ $value | humanizePercentage }} of key fetches are failing"

      # Goroutine leak
      - alert: MXKeysGoroutineLeak
        expr: |
          go_goroutines > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "MXKeys potential goroutine leak"
          description: "{{ $value }} goroutines are running"

      # Memory usage
      - alert: MXKeysHighMemory
        expr: |
          go_memstats_heap_alloc_bytes > 500 * 1024 * 1024
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "MXKeys high memory usage"
          description: "Heap allocation is {{ $value | humanize1024 }}B"

      # Service down
      - alert: MXKeysDown
        expr: |
          up{job="mxkeys"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MXKeys is down"
          description: "MXKeys instance {{ $labels.instance }} is not responding"

      # Low cache hit rate
      - alert: MXKeysLowCacheHitRate
        expr: |
          sum(rate(mxkeys_keys_cache_hits_total[5m]))
          /
          (sum(rate(mxkeys_keys_cache_hits_total[5m])) + sum(rate(mxkeys_keys_cache_misses_total[5m])))
          < 0.5
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "MXKeys low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }}"

      # Request rejections
      - alert: MXKeysRequestRejections
        expr: |
          rate(mxkeys_request_rejections_total[5m]) > 1
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "MXKeys rejecting requests"
          description: "{{ $value | humanize }} requests/sec rejected for {{ $labels.reason }}"

      # Circuit breaker trips
      - alert: MXKeysCircuitBreakerTrips
        expr: |
          rate(mxkeys_circuit_breaker_trips_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MXKeys circuit breakers tripping"
          description: "{{ $value | humanize }} circuit breaker trips/sec in the last 5 minutes"

      # Many open circuit breakers
      - alert: MXKeysCircuitBreakersOpen
        expr: |
          mxkeys_circuit_breaker_servers{state="open"} > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "MXKeys has many open circuit breakers"
          description: "{{ $value }} upstream servers are circuit-broken"

      # Transparency log STH monitoring (requires external verifier pushing metrics)
      # Use with mxkeys-verify -json piped to a Prometheus pushgateway or textfile collector:
      #
      #   mxkeys_sth_tree_size        — gauge of latest tree size
      #   mxkeys_sth_verify_success   — 1 if last verification passed, 0 otherwise
      #
      # Alert rules for STH (add when external metrics are available):
      #
      #   - alert: MXKeysSTHVerificationFailed
      #     expr: mxkeys_sth_verify_success == 0
      #     for: 10m
      #     labels:
      #       severity: critical
      #
      #   - alert: MXKeysSTHTreeSizeDecreased
      #     expr: delta(mxkeys_sth_tree_size[1h]) < 0
      #     labels:
      #       severity: critical
