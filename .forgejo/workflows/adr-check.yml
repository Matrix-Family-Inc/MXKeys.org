name: ADR check

on:
  push:
    branches: [main]
    paths:
      - 'docs/adr/**'
      - 'scripts/adr_lint.py'
      - '.forgejo/workflows/**'
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Structural ADR lint
        run: python3 scripts/adr_lint.py docs/adr
