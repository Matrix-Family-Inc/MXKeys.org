name: PR Gate

on:
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Keep job names in sync with scripts/verify-github-branch-protection.sh
  # and the repository's required status check configuration.
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit suite
        shell: bash
        run: |
          set -euo pipefail
          packages="$(bash ./scripts/go-package-list.sh | tr '\n' ' ')"
          go test -count=1 ${packages}

  integration:
    name: integration-with-fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # This targeted subset stays separate from the full unit suite so fixture-heavy
      # backend packages remain visible as an explicit required check in branch protection.
      - name: Run integration-like package tests
        run: go test -count=1 ./internal/server ./internal/keys ./internal/cluster ./internal/zero/canonical ./internal/zero/merkle ./internal/zero/raft

  integration-tagged:
    name: integration-tagged
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tagged integration tests
        run: go test -tags=integration -race -count=1 ./tests/integration/...

  race:
    name: race
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run race detector
        shell: bash
        run: |
          set -euo pipefail
          packages="$(bash ./scripts/go-package-list.sh | tr '\n' ' ')"
          go test -race -count=1 ${packages}

  vet:
    name: vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run go vet
        shell: bash
        run: |
          set -euo pipefail
          packages="$(bash ./scripts/go-package-list.sh | tr '\n' ' ')"
          go vet ${packages}

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check gofmt
        shell: bash
        run: |
          set -euo pipefail
          files="$(git ls-files '*.go')"
          if [ -z "${files}" ]; then
            exit 0
          fi
          unformatted="$(gofmt -l ${files})"
          if [ -n "${unformatted}" ]; then
            echo "Found unformatted files:"
            echo "${unformatted}"
            exit 1
          fi

  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint landing
        run: bun run lint
      - name: Test landing
        run: bun run test
      - name: Build landing
        run: bun run build

  security-vuln:
    name: security-vuln
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck (patched toolchain)
        shell: bash
        run: |
          set -euo pipefail
          packages="$(bash ./scripts/go-package-list.sh | tr '\n' ' ')"
          GOTOOLCHAIN=go1.26.2 "$(go env GOPATH)/bin/govulncheck" ${packages}

  security-sast:
    name: security-sast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec (high severity)
        shell: bash
        run: |
          set -euo pipefail
          package_dirs="$(bash ./scripts/go-package-list.sh dirs | tr '\n' ' ')"
          "$(go env GOPATH)/bin/gosec" -severity high ${package_dirs}
